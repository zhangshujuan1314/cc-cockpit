<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CC Cockpit</title>
  <style>
    :root {
      --bg-canvas: #0b0e13;
      --bg-panel: #111520;
      --bg-panel-header: #151a26;
      --bg-inset: #0a0d12;
      --bg-hover: #1a2030;
      --bg-active: #1e2a3a;
      --border: #1e2738;
      --border-light: #2a3548;
      --text: #d8dee9;
      --text-secondary: #8892a4;
      --text-muted: #4a5568;
      --blue: #5794f2;
      --blue-dim: rgba(87,148,242,0.12);
      --green: #73bf69;
      --green-dim: rgba(115,191,105,0.12);
      --orange: #ff9830;
      --orange-dim: rgba(255,152,48,0.12);
      --red: #f2495c;
      --red-dim: rgba(242,73,92,0.12);
      --purple: #b877d9;
      --purple-dim: rgba(184,119,217,0.12);
      --cyan: #8ab8ff;
      --yellow: #fad775;
      --radius: 4px;
      --panel-radius: 6px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-canvas); color: var(--text);
      height: 100vh; overflow: hidden; font-size: 13px;
    }
    .mono { font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace; }

    /* ═══════════ LAYOUT ═══════════ */
    .dashboard {
      display: grid;
      grid-template-columns: 240px 1fr 300px;
      grid-template-rows: 56px 1fr;
      height: 100vh;
      gap: 1px;
      background: var(--border);
    }

    /* ═══════════ NAV BAR ═══════════ */
    .navbar {
      grid-column: 1 / -1;
      background: var(--bg-panel);
      display: flex; align-items: center;
      padding: 0 20px; gap: 16px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; font-weight: 700; color: var(--blue);
      letter-spacing: -0.3px;
    }
    .brand svg { width: 22px; height: 22px; }

    .metrics-row {
      display: flex; gap: 6px; flex: 1; justify-content: center;
    }
    .metric {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-inset); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 6px 14px;
      min-width: 100px;
    }
    .metric .dot { width: 8px; height: 8px; border-radius: 50%; }
    .metric .dot.blue { background: var(--blue); }
    .metric .dot.green { background: var(--green); }
    .metric .dot.purple { background: var(--purple); }
    .metric .dot.orange { background: var(--orange); }
    .metric .label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .metric .val { font-size: 14px; font-weight: 700; color: var(--text); }
    .metric.clickable { cursor: pointer; border-color: var(--border-light); }
    .metric.clickable:hover { background: var(--bg-hover); }
    .metric.warn .val { color: var(--orange); }
    .metric.unknown .val { color: var(--text-muted); font-size: 11px; }

    .nav-right { display: flex; align-items: center; gap: 12px; }
    .badge {
      font-size: 10px; font-weight: 600; padding: 3px 10px;
      border-radius: 12px; cursor: pointer;
    }
    .badge.ok { background: var(--green-dim); color: var(--green); }
    .badge.missing { background: var(--orange-dim); color: var(--orange); }
    .ws-indicator {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--text-muted);
    }
    .ws-indicator .ring {
      width: 10px; height: 10px; border-radius: 50%;
      border: 2px solid var(--red); background: transparent;
      transition: all 0.3s;
    }
    .ws-indicator .ring.on {
      border-color: var(--green);
      background: var(--green);
      box-shadow: 0 0 8px rgba(115,191,105,0.4);
    }

    /* ═══════════ PANELS ═══════════ */
    .panel {
      background: var(--bg-panel);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .panel-head {
      padding: 12px 16px;
      background: var(--bg-panel-header);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .panel-title {
      font-size: 12px; font-weight: 600; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .panel-count {
      font-size: 10px; color: var(--text-muted);
      background: var(--bg-inset); padding: 2px 8px;
      border-radius: 10px; font-weight: 600;
    }
    .panel-body { flex: 1; overflow-y: auto; }

    /* ═══════════ SESSION LIST ═══════════ */
    .session {
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.1s;
    }
    .session:hover { background: var(--bg-hover); }
    .session.active { background: var(--bg-active); border-left: 2px solid var(--blue); }
    .session-row1 { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .session .status {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .session .status.on { background: var(--green); box-shadow: 0 0 6px rgba(115,191,105,0.5); }
    .session .status.off { background: var(--text-muted); }
    .session .name {
      font-size: 12px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    .session .model {
      font-size: 9px; padding: 1px 5px; border-radius: 3px;
      background: var(--purple-dim); color: var(--purple); font-weight: 600;
    }
    .session-row2 {
      display: flex; gap: 10px; font-size: 10px; color: var(--text-muted);
      margin-left: 14px;
    }
    .session .summary {
      font-size: 11px; color: var(--text-secondary); margin-top: 3px;
      margin-left: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ═══════════ MESSAGES ═══════════ */
    .messages { padding: 12px; }
    .msg {
      margin-bottom: 12px; border-radius: var(--panel-radius);
      border: 1px solid var(--border); overflow: hidden;
    }
    .msg.user { border-left: 3px solid var(--blue); }
    .msg.assistant { border-left: 3px solid var(--green); }
    .msg.system { border-left: 3px solid var(--orange); }
    .msg-head {
      padding: 6px 12px; display: flex; align-items: center; gap: 8px;
      background: var(--bg-panel-header); border-bottom: 1px solid var(--border);
      font-size: 11px;
    }
    .msg-tag {
      font-size: 9px; font-weight: 700; padding: 2px 6px;
      border-radius: 3px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .msg.user .msg-tag { background: var(--blue-dim); color: var(--blue); }
    .msg.assistant .msg-tag { background: var(--green-dim); color: var(--green); }
    .msg.system .msg-tag { background: var(--orange-dim); color: var(--orange); }
    .msg-model { font-size: 10px; color: var(--text-muted); }
    .msg-time { margin-left: auto; font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
    .msg-body { padding: 10px 12px; font-size: 13px; line-height: 1.7; }

    /* Tool card */
    .tool {
      background: var(--bg-inset); border: 1px solid var(--border);
      border-radius: var(--radius); margin: 6px 0; overflow: hidden;
    }
    .tool-head {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; cursor: pointer; user-select: none;
    }
    .tool-head:hover { background: var(--bg-hover); }
    .tool-badge {
      font-size: 9px; font-weight: 700; padding: 2px 6px;
      border-radius: 3px; text-transform: uppercase;
    }
    .tool-badge.read { background: var(--blue-dim); color: var(--blue); }
    .tool-badge.write { background: var(--orange-dim); color: var(--orange); }
    .tool-badge.search { background: var(--purple-dim); color: var(--purple); }
    .tool-badge.exec { background: var(--red-dim); color: var(--red); }
    .tool-badge.other { background: var(--bg-inset); color: var(--text-muted); }
    .tool-name { font-size: 11px; font-weight: 600; color: var(--text); }
    .tool-preview {
      font-size: 10px; color: var(--text-muted); flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-family: 'JetBrains Mono', monospace;
    }
    .tool-arrow { font-size: 10px; color: var(--text-muted); }
    .tool-body {
      display: none; padding: 8px 10px; border-top: 1px solid var(--border);
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      line-height: 1.5; color: var(--text-secondary);
    }
    .tool.open .tool-body { display: block; }
    .tool-result {
      margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text-secondary);
    }
    .tool-result.err { color: var(--red); }

    /* Thinking */
    .think {
      margin: 6px 0; border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .think-head {
      padding: 5px 10px; background: var(--bg-panel-header);
      font-size: 11px; color: var(--text-muted); cursor: pointer;
    }
    .think-head:hover { color: var(--text); }
    .think-body {
      display: none; padding: 8px 10px; font-size: 11px;
      font-family: 'JetBrains Mono', monospace; color: var(--text-secondary);
      line-height: 1.6; background: var(--bg-inset);
    }
    .think.open .think-body { display: block; }

    /* Sidechain */
    .sc {
      background: var(--bg-inset); border: 1px dashed var(--border-light);
      border-radius: var(--radius); margin: 6px 0; padding: 8px 10px;
    }
    .sc-head { font-size: 11px; color: var(--text-muted); cursor: pointer; }
    .sc-head:hover { color: var(--text); }
    .sc-body { display: none; margin-top: 6px; }
    .sc.open .sc-body { display: block; }

    .paused-bar {
      position: sticky; bottom: 0; text-align: center;
      padding: 6px; background: var(--blue-dim); color: var(--blue);
      font-size: 11px; cursor: pointer; border-radius: var(--radius);
    }

    /* ═══════════ FILE PANEL ═══════════ */
    .file {
      padding: 8px 14px; border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .file:hover { background: var(--bg-hover); }
    .file-row { display: flex; align-items: center; gap: 6px; }
    .file-icon { font-size: 13px; width: 18px; text-align: center; }
    .file-name {
      font-size: 11px; font-weight: 600; color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    .file-tag {
      font-size: 8px; font-weight: 700; padding: 2px 5px;
      border-radius: 3px; text-transform: uppercase;
    }
    .file-tag.modified { background: var(--orange-dim); color: var(--orange); }
    .file-tag.created { background: var(--green-dim); color: var(--green); }
    .file-tag.deleted { background: var(--red-dim); color: var(--red); }
    .file-tag.tool-written { background: var(--blue-dim); color: var(--blue); }
    .file-meta { font-size: 10px; color: var(--text-muted); margin-top: 3px; margin-left: 24px; }
    .diff {
      display: none; margin-top: 6px; background: var(--bg-inset);
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; font-size: 11px;
    }
    .file.open .diff { display: block; }
    .diff-tbl { width: 100%; border-collapse: collapse; }
    .diff-tbl td { padding: 1px 0; vertical-align: top; }
    .diff-ln { width: 36px; text-align: right; padding: 1px 4px 1px 2px !important; color: var(--text-muted); font-size: 10px; border-right: 1px solid var(--border); user-select: none; }
    .diff-c { padding: 1px 6px !important; white-space: pre-wrap; word-break: break-all; }
    .diff-c.add { background: rgba(115,191,105,0.06); color: var(--green); }
    .diff-c.del { background: rgba(242,73,92,0.06); color: var(--red); }
    .diff-c.ctx { color: var(--text-muted); }
    .diff-c.hdr { color: var(--blue); background: var(--bg-panel-header); font-weight: 600; }
    .diff-skip { padding: 12px; text-align: center; color: var(--text-muted); font-style: italic; }

    /* ═══════════ EMPTY ═══════════ */
    .empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 12px;
    }
    .empty .ico { font-size: 48px; opacity: 0.15; }
    .empty .ttl { font-size: 14px; font-weight: 600; color: var(--text-secondary); }
    .empty .desc { font-size: 12px; color: var(--text-muted); max-width: 280px; text-align: center; }

    /* ═══════════ MODAL ═══════════ */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 100; display: flex; align-items: center; justify-content: center;
    }
    .modal {
      background: var(--bg-panel); border: 1px solid var(--border-light);
      border-radius: 8px; padding: 24px; max-width: 520px; width: 90%;
    }
    .modal h3 { font-size: 15px; color: var(--text); margin-bottom: 4px; }
    .modal p.sub { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
    .modal table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .modal th { text-align: left; padding: 6px 8px; color: var(--text-muted); border-bottom: 1px solid var(--border); font-size: 10px; text-transform: uppercase; }
    .modal td { padding: 5px 8px; border-bottom: 1px solid var(--border); }
    .modal input {
      width: 64px; background: var(--bg-inset); color: var(--text);
      border: 1px solid var(--border); padding: 4px 6px; border-radius: var(--radius);
      font-size: 12px; font-family: 'JetBrains Mono', monospace;
    }
    .modal input:focus { border-color: var(--blue); outline: none; }
    .modal-actions { margin-top: 20px; display: flex; gap: 8px; justify-content: flex-end; }
    .btn { padding: 7px 18px; border-radius: var(--radius); font-size: 12px; font-weight: 600; cursor: pointer; border: none; }
    .btn-ghost { background: var(--bg-inset); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg-hover); }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: #6aa3f3; }

    /* ═══════════ SCROLLBAR ═══════════ */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- NAV -->
    <div class="navbar">
      <div class="brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        <span>CC Cockpit</span>
      </div>
      <div class="metrics-row">
        <div class="metric">
          <span class="dot blue"></span>
          <div><div class="label">Input</div><div class="val mono" id="m-in">0</div></div>
        </div>
        <div class="metric">
          <span class="dot green"></span>
          <div><div class="label">Output</div><div class="val mono" id="m-out">0</div></div>
        </div>
        <div class="metric">
          <span class="dot purple"></span>
          <div><div class="label">Cache</div><div class="val mono" id="m-cache">0</div></div>
        </div>
        <div class="metric clickable" id="m-cost-card">
          <span class="dot orange"></span>
          <div><div class="label">Cost</div><div class="val mono" id="m-cost">$0.00</div></div>
        </div>
      </div>
      <div class="nav-right">
        <div id="hooks-el"></div>
        <div class="ws-indicator"><span class="ring" id="ws-ring"></span><span id="ws-txt">断开</span></div>
      </div>
    </div>

    <!-- SESSIONS -->
    <div class="panel">
      <div class="panel-head"><span class="panel-title">会话</span><span class="panel-count" id="s-cnt">0</span></div>
      <div class="panel-body" id="s-list"></div>
    </div>

    <!-- MESSAGES -->
    <div class="panel">
      <div class="panel-head"><span class="panel-title">消息流</span><span class="panel-count" id="m-cnt">0</span></div>
      <div class="panel-body messages" id="m-flow">
        <div class="empty"><div class="ico">📡</div><div class="ttl">等待会话</div><div class="desc">启动 Claude Code 后消息将实时显示</div></div>
      </div>
    </div>

    <!-- FILES -->
    <div class="panel">
      <div class="panel-head"><span class="panel-title">文件改动</span><span class="panel-count" id="f-cnt">0</span></div>
      <div class="panel-body" id="f-list"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
