<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CC Cockpit - Claude Code 监控驾驶舱</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0a0e14; --bg-secondary: #111720; --bg-tertiary: #1a2030;
      --bg-card: #141a24; --border: #1e2a3a; --border-light: #2a3a4a;
      --text-primary: #e6edf3; --text-secondary: #8b949e; --text-muted: #4a5568;
      --accent: #58a6ff; --accent-dim: #1f6feb; --accent-glow: rgba(88,166,255,0.15);
      --success: #3fb950; --success-dim: rgba(63,185,80,0.15);
      --warning: #d29922; --warning-dim: rgba(210,153,34,0.15);
      --danger: #f85149; --danger-dim: rgba(248,81,73,0.15);
      --purple: #bc8cff; --purple-dim: rgba(188,140,255,0.15);
      --cyan: #39d0d8; --cyan-dim: rgba(57,208,216,0.15);
      --user-bg: #0f1722; --assistant-bg: #111b26; --tool-bg: #0d1520;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg-primary); color: var(--text-primary);
      height: 100vh; overflow: hidden; font-size: 13px; line-height: 1.5;
    }
    .mono { font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace; }
    .app {
      display: grid;
      grid-template-columns: 280px 1fr 340px;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }

    /* ═══════════ TOP BAR ═══════════ */
    .top-bar {
      grid-column: 1 / -1; background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px; display: flex; align-items: center; gap: 16px;
    }
    .logo {
      font-size: 15px; font-weight: 700; color: var(--accent);
      display: flex; align-items: center; gap: 8px; white-space: nowrap;
    }
    .logo .icon { font-size: 18px; }
    .logo .version { font-size: 10px; color: var(--text-muted); font-weight: 400; }

    /* Metric cards */
    .metrics { display: flex; gap: 8px; flex: 1; }
    .metric-card {
      background: var(--bg-tertiary); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 12px; min-width: 80px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .metric-card .label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .metric-card .value { font-size: 14px; font-weight: 700; font-family: 'Cascadia Code', monospace; }
    .metric-card.in .value { color: var(--accent); }
    .metric-card.out .value { color: var(--success); }
    .metric-card.cache .value { color: var(--purple); }
    .metric-card.cost { cursor: pointer; border-color: var(--border-light); }
    .metric-card.cost .value { color: var(--success); }
    .metric-card.cost.warning .value { color: var(--warning); }
    .metric-card.cost.unknown .value { color: var(--text-muted); font-size: 12px; }

    .top-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }
    .hooks-badge {
      padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .hooks-badge.ok { background: var(--success-dim); color: var(--success); border: 1px solid rgba(63,185,80,0.3); }
    .hooks-badge.missing { background: var(--warning-dim); color: var(--warning); border: 1px solid rgba(210,153,34,0.3); }
    .hooks-badge.missing:hover { background: rgba(210,153,34,0.25); }
    .ws-status {
      display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted);
    }
    .ws-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); transition: background 0.3s; }
    .ws-dot.connected { background: var(--success); box-shadow: 0 0 8px rgba(63,185,80,0.5); }

    /* ═══════════ SESSION LIST ═══════════ */
    .session-list {
      background: var(--bg-secondary); border-right: 1px solid var(--border);
      overflow-y: auto; display: flex; flex-direction: column;
    }
    .panel-header {
      padding: 14px 16px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted);
      border-bottom: 1px solid var(--border); position: sticky; top: 0;
      background: var(--bg-secondary); z-index: 2;
      display: flex; justify-content: space-between; align-items: center;
    }
    .panel-header .count {
      background: var(--bg-tertiary); padding: 2px 8px; border-radius: 10px;
      font-size: 10px; color: var(--text-secondary);
    }
    .session-item {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: all 0.15s; position: relative;
    }
    .session-item:hover { background: var(--bg-tertiary); }
    .session-item.active {
      background: var(--accent-glow); border-left: 3px solid var(--accent);
    }
    .session-item .session-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .session-item .status-indicator {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      position: relative;
    }
    .session-item .status-indicator.running {
      background: var(--success);
      box-shadow: 0 0 8px rgba(63,185,80,0.6);
      animation: pulse 2s infinite;
    }
    .session-item .status-indicator.idle { background: var(--text-muted); }
    .session-item .project-name {
      font-size: 12px; font-weight: 600; color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    .session-item .model-badge {
      font-size: 9px; padding: 1px 6px; border-radius: 4px;
      background: var(--purple-dim); color: var(--purple); font-weight: 600;
      white-space: nowrap;
    }
    .session-item .session-stats {
      display: flex; gap: 12px; font-size: 10px; color: var(--text-muted);
    }
    .session-item .session-stats .stat { display: flex; align-items: center; gap: 3px; }
    .session-item .summary {
      font-size: 11px; color: var(--text-secondary); margin-top: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ═══════════ MESSAGE FLOW ═══════════ */
    .message-flow { overflow-y: auto; padding: 16px; scroll-behavior: smooth; }
    .message-flow.paused::after {
      content: '⏸ 自动滚动已暂停 — 点击恢复';
      position: sticky; bottom: 0; display: block; text-align: center;
      padding: 8px; background: var(--accent-dim); color: var(--text-primary);
      font-size: 11px; cursor: pointer; border-radius: 6px; margin-top: 8px;
    }

    .msg {
      margin-bottom: 16px; border-radius: 8px; overflow: hidden;
      border: 1px solid var(--border); transition: border-color 0.2s;
    }
    .msg:hover { border-color: var(--border-light); }
    .msg.user { background: var(--user-bg); border-left: 3px solid var(--accent); }
    .msg.assistant { background: var(--assistant-bg); border-left: 3px solid var(--success); }
    .msg.system { background: var(--bg-tertiary); border-left: 3px solid var(--warning); }

    .msg-header {
      display: flex; align-items: center; gap: 8px; padding: 8px 14px;
      font-size: 11px; color: var(--text-muted); border-bottom: 1px solid var(--border);
    }
    .msg-role {
      font-weight: 700; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.8px; padding: 2px 8px; border-radius: 4px;
    }
    .msg.user .msg-role { background: var(--accent-glow); color: var(--accent); }
    .msg.assistant .msg-role { background: var(--success-dim); color: var(--success); }
    .msg.system .msg-role { background: var(--warning-dim); color: var(--warning); }
    .msg-model {
      font-size: 10px; padding: 2px 6px; border-radius: 4px;
      background: var(--bg-tertiary); color: var(--text-muted);
    }
    .msg-time { margin-left: auto; font-size: 10px; font-family: 'Cascadia Code', monospace; }

    .msg-body { padding: 12px 14px; font-size: 13px; line-height: 1.7; }
    .msg-body pre { white-space: pre-wrap; word-break: break-word; }

    /* Tool cards */
    .tool-card {
      background: var(--tool-bg); border: 1px solid var(--border);
      border-radius: 6px; margin: 8px 0; overflow: hidden;
    }
    .tool-header {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      background: var(--bg-tertiary); cursor: pointer; user-select: none;
      transition: background 0.15s;
    }
    .tool-header:hover { background: var(--border); }
    .tool-tag {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .tool-tag.read { background: var(--accent-glow); color: var(--accent); }
    .tool-tag.write { background: var(--warning-dim); color: var(--warning); }
    .tool-tag.search { background: var(--purple-dim); color: var(--purple); }
    .tool-tag.exec { background: var(--danger-dim); color: var(--danger); }
    .tool-tag.other { background: var(--bg-card); color: var(--text-muted); }
    .tool-name { font-weight: 600; font-size: 12px; color: var(--text-primary); }
    .tool-preview {
      font-size: 11px; color: var(--text-muted); flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-family: 'Cascadia Code', monospace;
    }
    .tool-toggle { font-size: 10px; color: var(--text-muted); margin-left: auto; }
    .tool-body {
      display: none; padding: 10px 12px; font-size: 11px;
      border-top: 1px solid var(--border);
      font-family: 'Cascadia Code', monospace; line-height: 1.6;
    }
    .tool-card.expanded .tool-body { display: block; }
    .tool-result {
      margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border);
      color: var(--text-secondary); font-size: 11px;
    }
    .tool-result.error { color: var(--danger); }

    /* Thinking */
    .thinking-block {
      margin: 6px 0; border-radius: 6px; overflow: hidden;
      border: 1px solid var(--border);
    }
    .thinking-header {
      padding: 6px 10px; background: var(--bg-tertiary); cursor: pointer;
      font-size: 11px; color: var(--text-muted); user-select: none;
    }
    .thinking-header:hover { color: var(--text-primary); }
    .thinking-body {
      display: none; padding: 10px; font-size: 11px; color: var(--text-secondary);
      background: var(--bg-card); font-family: 'Cascadia Code', monospace;
      line-height: 1.6; white-space: pre-wrap;
    }
    .thinking-block.expanded .thinking-body { display: block; }

    /* Sidechain */
    .sidechain {
      background: var(--bg-tertiary); border: 1px dashed var(--border-light);
      border-radius: 6px; margin: 8px 0; padding: 10px 12px;
    }
    .sidechain-header {
      font-size: 11px; color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; gap: 6px;
    }
    .sidechain-header:hover { color: var(--text-primary); }
    .sidechain-body { display: none; margin-top: 8px; }
    .sidechain.expanded .sidechain-body { display: block; }

    /* ═══════════ FILE PANEL ═══════════ */
    .file-panel {
      background: var(--bg-secondary); border-left: 1px solid var(--border);
      overflow-y: auto; display: flex; flex-direction: column;
    }
    .file-card {
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.15s;
    }
    .file-card:hover { background: var(--bg-tertiary); }
    .file-top { display: flex; align-items: center; gap: 8px; }
    .file-icon { font-size: 14px; width: 20px; text-align: center; }
    .file-icon.tool { filter: drop-shadow(0 0 4px rgba(210,153,34,0.5)); }
    .file-name {
      font-size: 12px; font-weight: 600; color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
      font-family: 'Cascadia Code', monospace;
    }
    .file-status {
      font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .file-status.modified { background: var(--warning-dim); color: var(--warning); }
    .file-status.created { background: var(--success-dim); color: var(--success); }
    .file-status.deleted { background: var(--danger-dim); color: var(--danger); }
    .file-status.tool-written { background: var(--accent-glow); color: var(--accent); }
    .file-meta { font-size: 10px; color: var(--text-muted); margin-top: 4px; display: flex; gap: 8px; }
    .diff-view {
      display: none; margin-top: 8px; background: var(--bg-primary);
      border-radius: 6px; overflow: hidden; font-size: 11px;
      font-family: 'Cascadia Code', monospace; border: 1px solid var(--border);
    }
    .file-card.expanded .diff-view { display: block; }
    .diff-table { width: 100%; border-collapse: collapse; }
    .diff-table td { padding: 1px 0; vertical-align: top; }
    .diff-line-num {
      width: 40px; text-align: right; padding: 1px 6px 1px 4px !important;
      color: var(--text-muted); user-select: none; font-size: 10px;
      border-right: 1px solid var(--border);
    }
    .diff-line-code { padding: 1px 8px 1px 6px !important; white-space: pre-wrap; word-break: break-all; }
    .diff-line-code.add { background: rgba(63,185,80,0.08); color: var(--success); }
    .diff-line-code.del { background: rgba(248,81,73,0.08); color: var(--danger); }
    .diff-line-code.ctx { color: var(--text-muted); }
    .diff-line-code.header { color: var(--accent); background: var(--bg-tertiary); font-weight: 600; }
    .diff-skipped { padding: 16px; text-align: center; color: var(--text-muted); font-style: italic; }

    /* ═══════════ EMPTY STATE ═══════════ */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; color: var(--text-muted);
      text-align: center; gap: 16px;
    }
    .empty-state .icon { font-size: 56px; opacity: 0.2; }
    .empty-state .title { font-size: 16px; font-weight: 600; color: var(--text-secondary); }
    .empty-state .desc { font-size: 12px; max-width: 320px; line-height: 1.6; }

    /* ═══════════ TOKEN MODAL ═══════════ */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); z-index: 100;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px; max-width: 560px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal h3 { margin-bottom: 16px; color: var(--accent); font-size: 16px; }
    .modal table { width: 100%; font-size: 12px; border-collapse: collapse; }
    .modal th {
      text-align: left; padding: 8px; color: var(--text-muted);
      border-bottom: 1px solid var(--border); font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .modal td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
    .modal input {
      width: 70px; background: var(--bg-tertiary); color: var(--text-primary);
      border: 1px solid var(--border); padding: 4px 8px; border-radius: 4px;
      font-size: 12px; font-family: 'Cascadia Code', monospace;
    }
    .modal input:focus { border-color: var(--accent); outline: none; }
    .modal-btns { margin-top: 20px; display: flex; gap: 8px; justify-content: flex-end; }
    .btn {
      padding: 8px 20px; border-radius: 6px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: none; transition: all 0.15s;
    }
    .btn-cancel { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-cancel:hover { background: var(--border); }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { background: #79b8ff; }

    /* ═══════════ SCROLLBAR ═══════════ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- ═══ TOP BAR ═══ -->
    <div class="top-bar">
      <div class="logo">
        <span class="icon">⚡</span>
        <span>CC Cockpit</span>
        <span class="version">v0.1.0</span>
      </div>
      <div class="metrics">
        <div class="metric-card in">
          <span class="label">Input</span>
          <span class="value mono" id="cost-input">0</span>
        </div>
        <div class="metric-card out">
          <span class="label">Output</span>
          <span class="value mono" id="cost-output">0</span>
        </div>
        <div class="metric-card cache">
          <span class="label">Cache Read</span>
          <span class="value mono" id="cost-cache-read">0</span>
        </div>
        <div class="metric-card cost" id="cost-card" title="点击设置定价">
          <span class="label">Cost</span>
          <span class="value mono" id="cost-total">$0.00</span>
        </div>
      </div>
      <div class="top-right">
        <div id="hooks-status"></div>
        <div class="ws-status"><span class="ws-dot" id="ws-dot"></span><span id="ws-status">断开</span></div>
      </div>
    </div>

    <!-- ═══ SESSION LIST ═══ -->
    <div class="session-list">
      <div class="panel-header">
        <span>会话</span>
        <span class="count" id="session-count">0</span>
      </div>
      <div id="session-items"></div>
    </div>

    <!-- ═══ MESSAGE FLOW ═══ -->
    <div class="message-flow" id="message-flow">
      <div class="empty-state" id="empty-state">
        <div class="icon">📡</div>
        <div class="title">等待会话...</div>
        <div class="desc">启动 Claude Code 执行任务后，消息流将实时显示在这里</div>
      </div>
    </div>

    <!-- ═══ FILE PANEL ═══ -->
    <div class="file-panel">
      <div class="panel-header">
        <span>文件改动</span>
        <span class="count" id="file-count">0</span>
      </div>
      <div id="file-items"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
